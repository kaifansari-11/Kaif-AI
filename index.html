<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaif AI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="logo-text">Kaif AI</span>
      <button class="icon-btn" id="newChatBtn" title="New chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>

    <div class="sidebar-section-label">Chats</div>
    <div id="sessionList"></div>

    <div class="sidebar-footer">
    <div id="authSection" class="auth-section"></div>
    
      <select id="modelSelect">
        <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
        <option value="claude-opus-4-8">Claude Opus 4.8</option>
        <option value="gpt-4o">GPT-4o</option>
        <option value="gpt-4o-mini">GPT-4o mini</option>
        <option value="gemini-1-5-flash">Gemini 1.5 Flash</option>
      </select>
    </div>
  </aside>

  <!-- MOBILE OVERLAY -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- MAIN AREA -->
  <div class="main" id="main">

    <!-- TOP BAR -->
    <header class="topbar">
      <button class="icon-btn" id="sidebarToggle" title="Toggle sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <span class="topbar-model" id="currentModel">Claude Sonnet 4.6</span>
      <button class="icon-btn danger" id="clearBtn" title="Clear chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </header>

    <!-- CHAT BOX -->
    <div id="chat-box">
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-logo">K</div>
        <h2>How can I help you?</h2>
        <p>Ask anything. Attach files, images, PDFs, or spreadsheets.</p>
        <div class="quick-prompts">
          <button class="qp-btn" onclick="quickPrompt('Explain how the internet works')">Explain the internet</button>
          <button class="qp-btn" onclick="quickPrompt('Write a Python script to sort a list')">Python sort script</button>
          <button class="qp-btn" onclick="quickPrompt('What are the best practices for REST APIs?')">REST API tips</button>
          <button class="qp-btn" onclick="quickPrompt('Help me debug my JavaScript code')">Debug JS code</button>
        </div>
      </div>
    </div>

    <!-- INPUT AREA -->
    <div class="input-wrap">
      <div id="uploadedFiles"></div>
      <div class="input-box">
        <label for="fileInput" class="attach-btn" title="Attach file">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66L9.41 17.41a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        </label>
        <input type="file" id="fileInput" multiple hidden>
        <textarea id="prompt" placeholder="Message Kaif AI..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <p class="input-hint">Enter to send · Shift+Enter for new line · Paste images with Ctrl+V</p>
    </div>

  </div>

  <!-- SCROLL TO BOTTOM -->
  <button class="scroll-btn" id="scrollBtn" onclick="scrollToBottom()" title="Scroll to bottom">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
  </button>

  <script src="https://js.puter.com/v2/"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
